<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miden Wallet Extension</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #000000;
            color: #ffffff;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Responsive Container */
        .popup-container {
            width: 400px;
            height: 700px;
            overflow: hidden;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: white;
            position: relative;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 1.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.3);
        }

        .network-info {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .network-indicator {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: #ef4444;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .network-dot {
            width: 8px;
            height: 8px;
            background: #ef4444;
            border-radius: 50%;
        }

        .switch-network {
            color: #4ecdc4;
            font-size: 0.75rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .switch-network:hover {
            color: #ffffff;
        }

        .header-center {
            flex: 1;
            text-align: center;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        /* Three-dot menu button */
        .three-dot-menu {
            background: none;
            border: none;
            color: #a8b2d1;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 0.5rem;
            border-radius: 8px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .three-dot-menu:hover {
            color: #ffffff;
            background: rgba(255, 255, 255, 0.1);
        }

        /* Three-dot dropdown menu */
        .three-dot-dropdown {
            position: absolute;
            top: 100%;
            right: 0;
            background: rgba(0, 0, 0, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 0.5rem;
            margin-top: 0.5rem;
            z-index: 1000;
            backdrop-filter: blur(10px);
            min-width: 200px;
        }

        .three-dot-menu-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            color: white;
        }

        .three-dot-menu-item:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .three-dot-menu-item.danger {
            color: #ef4444;
        }

        .three-dot-menu-item.danger:hover {
            background: rgba(239, 68, 68, 0.2);
        }

        .three-dot-menu-icon {
            font-size: 1rem;
            width: 20px;
            text-align: center;
        }

        .three-dot-menu-text {
            font-size: 0.875rem;
            font-weight: 500;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .network-indicator {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 0.75rem;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .network-dot {
            width: 8px;
            height: 8px;
            background: #ef4444;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .network-text {
            font-size: 0.875rem;
            font-weight: 500;
            color: #ffffff;
        }

        .switch-network-btn {
            background: transparent;
            border: none;
            color: #a8b2d1;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            padding: 0.25rem 0.5rem;
            border-radius: 8px;
        }

        .switch-network-btn:hover {
            color: #ffffff;
            background: rgba(255, 255, 255, 0.1);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .disconnect-btn {
            background: linear-gradient(45deg, #ff6b6b, #ee5a52);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 2px 10px rgba(255, 107, 107, 0.3);
        }

        .disconnect-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.4);
        }

        /* Account Section */
        .account-section {
            position: relative;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin: 1rem 0;
        }

        .account-info {
            flex: 1;
            min-width: 0;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .account-avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #8b5cf6, #a855f7);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 1.25rem;
            flex-shrink: 0;
        }

        .account-details {
            flex: 1;
            min-width: 0;
        }

        .account-label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.25rem;
            color: #ffffff;
            font-size: 0.875rem;
            font-weight: 600;
        }

        .dropdown-arrow {
            color: #a8b2d1;
            font-size: 0.75rem;
            transition: all 0.3s ease;
        }

        .account-info:hover .dropdown-arrow {
            color: #ffffff;
        }

        .account-address {
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 0.75rem;
            color: #a8b2d1;
            word-break: break-all;
        }

        .copy-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #a8b2d1;
            padding: 0.5rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }

        .copy-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            color: #ffffff;
            transform: scale(1.05);
        }

        /* Main Content */
        .main-content {
            padding: 1.5rem;
            height: 700px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        /* Tab Content */
        .tab-content {
            padding: 1rem 0;
            height: 100%;
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .tab-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: white;
            margin-bottom: 1.5rem;
            text-align: center;
        }

        /* Send Tab Specific Styles */
        .tab-content > div {
            min-height: 400px;
            display: flex;
            flex-direction: column;
            flex: 1;
            justify-content: space-between;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            color: white;
            font-weight: 600;
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
        }

        .form-input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 0.875rem;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        .form-input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        .form-input:focus {
            outline: none;
            border-color: #1e40af;
            background: rgba(255, 255, 255, 0.15);
        }

        /* Amount Input Section */
        .amount-section {
            margin-bottom: 1.5rem;
        }

        .amount-input-wrapper {
            display: flex;
            gap: 0.75rem;
            align-items: center;
        }

        .amount-input {
            flex: 1;
            padding: 0.75rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 0.875rem;
            transition: all 0.3s ease;
        }

        .max-btn {
            background: #1e40af;
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .max-btn:hover {
            background: #1d4ed8;
            transform: translateY(-1px);
        }

        /* Recipient Input Section */
        .recipient-section {
            margin-bottom: 1.5rem;
        }

        .recipient-input-wrapper {
            display: flex;
            gap: 0.75rem;
            align-items: center;
        }

        .recipient-input {
            flex: 1;
            padding: 0.75rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 0.875rem;
            transition: all 0.3s ease;
        }

        .scan-btn {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 0.75rem;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            min-width: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .scan-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-1px);
        }
        
        .address-helper {
            margin-top: 0.5rem;
            color: #a8b2d1;
            font-size: 0.75rem;
        }
        
        .address-helper small {
            color: #a8b2d1;
        }

        /* Payment Options Section */
        .payment-options {
            margin-bottom: 1.5rem;
            flex: 1;
        }

        .payment-option {
            display: flex;
            align-items: center;
            margin-bottom: 1rem;
            padding: 0.75rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .payment-option:last-child {
            margin-bottom: 0;
        }

        .payment-checkbox {
            width: 18px;
            height: 18px;
            margin-right: 0.75rem;
            accent-color: #1e40af;
        }

        .payment-label {
            color: white;
            font-size: 0.875rem;
            font-weight: 500;
        }

        /* Send Button */
        .send-btn {
            background: #1e40af;
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            margin-top: 1rem;
            margin-bottom: 1rem;
        }

        .send-btn:hover {
            background: #1d4ed8;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(30, 64, 175, 0.4);
        }

        .send-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        /* Transaction Info Styles */
        .transaction-info {
            margin-top: 1.5rem;
            padding: 1rem;
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
            border-radius: 12px;
            color: white;
        }
        
        .transaction-info h4 {
            margin: 0 0 1rem 0;
            color: #22c55e;
            font-size: 1.1rem;
            font-weight: 600;
        }
        
        .transaction-details {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }
        
        .detail-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .detail-row:last-child {
            border-bottom: none;
        }
        
        .detail-row .label {
            font-weight: 500;
            color: #a8b2d1;
        }
        
        .detail-row .value {
            font-weight: 600;
            color: white;
            word-break: break-all;
        }
        
        .explorer-link {
            color: #3b82f6;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s ease;
        }
        
        .explorer-link:hover {
            color: #60a5fa;
            text-decoration: underline;
        }
        
        /* Transaction Actions */
        .transaction-actions {
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .clear-transaction-btn {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.3);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
        }
        
        .clear-transaction-btn:hover {
            background: rgba(239, 68, 68, 0.3);
            border-color: rgba(239, 68, 68, 0.5);
        }

        /* Fixed Footer for Bottom Buttons */
        .fixed-footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding: 1rem 1.5rem;
            z-index: 1000;
        }

        .footer-button {
            background: #1e40af;
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
        }

        .footer-button:hover {
            background: #1d4ed8;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(30, 64, 175, 0.4);
        }

        .footer-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* Adjust main content to account for fixed footer */
        .main-content {
            padding: 1.5rem;
            height: 700px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            padding-bottom: 5rem; /* Space for fixed footer */
        }
        
        /* Ensure send tab content has enough height for scrolling */
        .send-tab-content {
            min-height: 600px;
            padding-bottom: 3rem; /* Extra space for transaction info */
        }
        
        /* Transaction info with proper spacing and visibility */
        .transaction-info {
            margin: 2rem 0;
            padding: 1.5rem;
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
            border-radius: 12px;
            color: white;
            position: relative;
            z-index: 10;
            box-shadow: 0 4px 20px rgba(34, 197, 94, 0.2);
        }
        
        /* Ensure proper scrolling for send tab */
        .send-tab-content {
            min-height: 600px;
            padding-bottom: 4rem; /* Extra space for transaction info and footer */
            overflow-y: visible;
        }
        
        /* Main content scrolling improvements */
        .main-content {
            scroll-behavior: smooth;
            scrollbar-width: thin;
            scrollbar-color: rgba(255, 255, 255, 0.3) transparent;
        }
        
        .main-content::-webkit-scrollbar {
            width: 8px;
        }
        
        .main-content::-webkit-scrollbar-track {
            background: transparent;
        }
        
        .main-content::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 4px;
        }
        
        .main-content::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.5);
        }

        /* Utility Classes */
        .flex {
            display: flex;
        }

        .gap-2 {
            gap: 0.5rem;
        }

        .mb-3 {
            margin-bottom: 0.75rem;
        }

        .mb-4 {
            margin-bottom: 1rem;
        }

        .flex-1 {
            flex: 1;
        }

        .px-4 {
            padding-left: 1rem;
            padding-right: 1rem;
        }

        .py-2 {
            padding-top: 0.5rem;
            padding-bottom: 0.5rem;
        }

        .text-sm {
            font-size: 0.875rem;
        }

        .items-center {
            align-items: center;
        }

        .text-center {
            text-align: center;
        }

        .text-gray-400 {
            color: #9ca3af;
        }

        .text-xs {
            font-size: 0.75rem;
        }

        .mt-2 {
            margin-top: 0.5rem;
        }

        .relative {
            position: relative;
        }

        /* Form Elements */
        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            color: #a8b2d1;
            margin-bottom: 0.5rem;
        }

        .form-input {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            padding: 0.875rem 1rem;
            color: white;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: #4ecdc4;
            box-shadow: 0 0 0 3px rgba(78, 205, 196, 0.1);
        }

        .form-input::placeholder {
            color: #6b7280;
        }

        /* Amount Buttons */
        .amount-buttons {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 1rem;
        }

        .amount-btn {
            flex: 1;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 0.75rem;
            border-radius: 12px;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .amount-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        .amount-btn:active {
            transform: translateY(0);
        }

        /* Action Buttons */
        .action-btn {
            width: 100%;
            background: linear-gradient(45deg, #4ecdc4, #44a08d);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 16px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(78, 205, 196, 0.3);
            margin-bottom: 1rem;
        }

        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(78, 205, 196, 0.4);
        }

        .action-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* Network Info */
        .network-info {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 16px;
            padding: 1rem;
            margin-top: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .network-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }

        .network-row:last-child {
            margin-bottom: 0;
        }

        .network-label {
            font-size: 0.875rem;
            color: #a8b2d1;
        }

        .network-value {
            font-size: 0.875rem;
            color: #ffffff;
            font-weight: 500;
        }

        /* Faucet Info */
        .faucet-info {
            background: rgba(255, 193, 7, 0.1);
            border: 1px solid rgba(255, 193, 7, 0.3);
            border-radius: 16px;
            padding: 1rem;
            margin-top: 1.5rem;
        }

        .faucet-title {
            font-size: 0.875rem;
            font-weight: 600;
            color: #ffc107;
            margin-bottom: 0.75rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .faucet-details {
            font-size: 0.75rem;
            color: #ffd54f;
            line-height: 1.4;
        }

        /* Loading States */
        .loading {
            opacity: 0.7;
            pointer-events: none;
        }

        .loading::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 20px;
            height: 20px;
            margin: -10px 0 0 -10px;
            border: 2px solid #4ecdc4;
            border-top: 2px solid transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Responsive Design */
        @media (max-width: 380px) {
            .popup-container {
                max-width: 100%;
            }
            
            .main-content {
                padding: 1rem;
            }
            
            .balance-amount {
                font-size: 2.5rem;
            }
            
            .amount-buttons {
                flex-direction: column;
            }
        }

        /* Smooth Transitions */
        .tab-content {
            animation: fadeIn 0.3s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Scrollbar Styling */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.5);
        }

        /* Create Wallet Screen - MetaMask Style */
